# secrets.yaml — Encrypted via sops-nix
#
# Before deploying, encrypt this file with:
#   cd /etc/nixos && sops secrets/secrets.yaml
#
# Each password should be a single line. References in configs read the file.
# All entries should be replaced with actual values before encryption.

# PostgreSQL database passwords
postgres:
    immich_pass: "___SECRET___REPLACE___"
    paperless_pass: "___SECRET___REPLACE___"
    mealie_pass: "___SECRET___REPLACE___"
    nextcloud_pass: "___SECRET___REPLACE___"
    dawarich_pass: "___SECRET___REPLACE___"
    vaultwarden_pass: "___SECRET___REPLACE___"

# Restic backup repository password
restic:
    password: "___SECRET___REPLACE___"

# NordVPN credentials (used by gluetun container)
vpn:
    user: "___SECRET___REPLACE___"
    password: "___SECRET___REPLACE___"

# Cloudflared tunnel credentials JSON
# Paste the entire JSON from Cloudflare Zero Trust dashboard
cloudflared:
    tunnel-credentials: |
        ___SECRET___REPLACE___
